<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;700&family=Inter:wght@500;600&family=Mona+Sans:wdth,wght@125,700&display=swap"
    rel="stylesheet">
  <style>
    html {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      color: #000;
    }

    html,
    body {
      margin: 0;
      width: fit-content;
    }

    .mona-sans {
      font-family: "Mona Sans", sans-serif;
      font-optical-sizing: auto;
      font-style: normal;
    }

    .geist-mono {
      font-family: "Geist Mono", monospace;
      font-optical-sizing: auto;
      font-weight: 400;
      font-style: normal;
    }

    * {
      box-sizing: border-box;
    }

    .flex {
      display: flex;
    }

    .none {
      display: none;
    }

    .flex-wrap {
      flex-wrap: wrap;
    }

    .flex-1 {
      flex: 1 1 0;
    }

    .flex-auto {
      flex: 1 1 auto;
    }

    .flex-none {
      flex: none;
    }

    .items-center {
      align-items: center;
    }

    .items-start {
      align-items: flex-start;
    }

    .items-end {
      align-items: flex-end;
    }

    .items-baseline {
      align-items: baseline;
    }

    .items-stretch {
      align-items: stretch;
    }

    .self-auto {
      align-self: auto;
    }

    .self-start {
      align-self: flex-start;
    }

    .self-end {
      align-self: flex-end;
    }

    .self-center {
      align-self: center;
    }

    .self-stretch {
      align-self: stretch;
    }

    .justify-around {
      justify-content: space-around;
    }

    .justify-between {
      justify-content: space-between;
    }

    .justify-center {
      justify-content: center;
    }

    .justify-start {
      justify-content: flex-start;
    }

    .justify-end {
      justify-content: flex-end;
    }

    .flex-row {
      flex-direction: row;
    }

    .flex-col {
      flex-direction: column;
    }

    .flex-col-reverse {
      flex-direction: column-reverse;
    }

    .text-upper {
      text-transform: uppercase;
    }

    .text-underline {
      text-decoration: underline;
    }

    .text-center {
      text-align: center;
    }

    .text-bold {
      font-weight: 700;
    }

    .card {
      background: --card-bg-color;
      width: 1200px;
      height: 675px;
      padding: 40px 36px 30px;
      position: relative;
      color: white;
    }

    .logo {
      height: 24px;
      width: 156px;
      display: block;
      margin-right: 45px;
    }

    .pnl {
      font-size: 72px;
      line-height: 90%;
      font-weight: 700;
      font-stretch: 125%;
      color: --card-bg-color;
    }

    .right-img {
      position: absolute;
      top: 0px;
      right: 0px;
      height: 100%;
    }

    .arrow {
      width: 24px;
      height: 24px;
      margin-top: -4px;
      margin-bottom: -4px;
      margin-right: -4px;
      margin-left: -6px;
    }

    .person-img {
      position: absolute;
      height: 100%;
      bottom: 0px;
      right: 0px;
      mix-blend-mode: multiply;
    }

    .box {
      background: #0F0F0F;
      border-radius: 33px;
      height: 100%;
      width: fit-content;
      padding: 30px 30px 55px;
      min-width: 550px;
      position: relative;
    }

    .box-bottom {
      margin-top: 30px;
    }

    .wrapper {
      width: 100%;
      padding-top: 24px;
      border-top: 1px solid #494949;
    }

    .wrapper+.wrapper {
      margin-left: 24px;
    }

    .text {
      font-size: 24px;
      line-height: 100%;
    }

    .text-gray {
      color: #707070;
    }

    .mt-45 {
      margin-top: 45px;
    }

    .mt-12 {
      margin-top: 12px;
    }

    .text-black {
      color: #0F0F0F;
    }

    .account {
      font-size: 30px;
      line-height: 80%;
    }

    .avatar {
      border: 1px solid #2A2A2A;
      border-radius: 100%;
      width: 64px;
      height: 64px;
      margin-right: 16px;
    }

    .avatar img {
      width: 50%;
    }

    .text-semibold {
      font-weight: 600;
    }

    .text-nowrap {
      white-space: nowrap;
    }
  </style>
</head>

<body>
  <div class="card flex flex-col justify-between">
    <img class="person-img" src={trendImage} alt="">
    <div class="box flex flex-col justify-between">
      <div class="flex items-center">
        <div class="avatar flex items-center justify-center">
          <img src="{avatar}" alt="">
        </div>
        <div class="account">{account}</div>
      </div>
      <div>
        <div class="wrapper flex justify-between">
          <div class="pnl mona-sans">{pnl}%</div>
          <div class="text text-gray">PnL</div>
        </div>
        <div class="flex mt-45 text">
          <div class="wrapper">
            <div class="text-semibold text-nowrap">{trendTitle}</div>
            <div class="mt-12">
              <img class="arrow" src="{arrowImage}" alt="">
              <span class="text-gray">{positionInfo}</span>
            </div>
          </div>
          <div class="wrapper">
            <div class="flex justify-between">
              <div class="text-gray">Entry:</div>
              <div class="text-semibold">{openLevel}</div>
            </div>
            <div class="flex justify-between mt-12 {exitLevelClass}">
              <div class="text-gray">Exit:</div>
              <div class="text-semibold">{exitLevel}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="box-bottom flex items-end">
      <img src="{logo}" class="logo" alt="">
      <div class="text-upper geist-mono text-black">trade attention on <span
          class="text-underline text-bold">Trendle.fi</span>
      </div>
    </div>
  </div>
</body>

</html>
